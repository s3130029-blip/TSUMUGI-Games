
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ふうせんわり</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            background: linear-gradient(160deg, #87CEEB 0%, #E0F4FF 60%, #C5E8F7 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Hiragino Rounded Gothic ProN', 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
        }

        /* ===== HUD ===== */
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            z-index: 50;
            pointer-events: none;
        }

        #lives {
            display: flex;
            gap: 2px;
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.15));
        }

        .heart { transition: transform 0.2s, opacity 0.3s; }
        .heart.lost { opacity: 0.22; transform: scale(0.8); }

        #score {
            font-size: clamp(1.3rem, 4.5vw, 2.1rem);
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 7px 20px;
            border-radius: 999px;
            white-space: nowrap;
        }

        #level-badge {
            font-size: clamp(0.85rem, 3.2vw, 1.2rem);
            font-weight: bold;
            color: #fff;
            background: rgba(80,80,220,0.45);
            backdrop-filter: blur(4px);
            padding: 7px 14px;
            border-radius: 999px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        /* ===== Balloon ===== */
        #game-area {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            animation: float-up linear forwards;
        }

        .b-body {
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            position: relative;
            box-shadow: inset -8px -12px 20px rgba(0,0,0,0.1);
            transition: transform 0.08s ease;
        }

        .balloon:active .b-body { transform: scale(1.18); }

        .b-shine {
            position: absolute;
            top: 18%; left: 22%;
            width: 28%; height: 32%;
            background: rgba(255,255,255,0.42);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .b-tip {
            width: 0; height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            margin-top: -1px;
        }

        .b-knot { width: 11px; height: 9px; border-radius: 50%; }

        .b-string {
            width: 1.5px; height: 52px;
            background: rgba(0,0,0,0.22);
            margin-top: 2px;
        }

        @keyframes float-up {
            0%   { transform: translateY(0) rotate(-4deg); }
            20%  { transform: translateY(-22vh) rotate(4deg); }
            40%  { transform: translateY(-44vh) rotate(-3deg); }
            60%  { transform: translateY(-66vh) rotate(4deg); }
            80%  { transform: translateY(-88vh) rotate(-3deg); }
            100% { transform: translateY(-128vh) rotate(3deg); }
        }

        /* ===== Burst / pop word ===== */
        .burst { position: fixed; pointer-events: none; z-index: 200; }

        .burst-dot {
            position: absolute;
            border-radius: 50%;
            animation: burst-move 0.5s ease-out forwards;
        }

        @keyframes burst-move {
            from { transform: translate(0,0) scale(1); opacity: 1; }
            to   { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
        }

        .pop-word {
            position: fixed;
            font-size: clamp(1.4rem, 6vw, 2.4rem);
            font-weight: bold;
            color: #FF4455;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.12);
            pointer-events: none;
            z-index: 300;
            animation: pop-word 0.8s ease-out forwards;
            transform: translate(-50%, -50%);
        }

        @keyframes pop-word {
            0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
            55%  { transform: translate(-50%,-110%) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%,-150%) scale(1.1); opacity: 0; }
        }

        /* ===== Floating notifications ===== */
        .notif {
            position: fixed;
            left: 50%;
            top: 42%;
            font-weight: bold;
            pointer-events: none;
            z-index: 400;
            animation: notif-anim 1.3s ease-out forwards;
            white-space: nowrap;
        }

        .notif-milestone {
            font-size: clamp(1.8rem, 8vw, 3.2rem);
            color: #FFD700;
            text-shadow: 3px 3px 0 #FF8C00;
        }

        .notif-levelup {
            font-size: clamp(1.5rem, 6.5vw, 2.6rem);
            color: #44AAFF;
            text-shadow: 3px 3px 0 #0044AA;
        }

        @keyframes notif-anim {
            0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
            50%  { transform: translate(-50%,-62%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%,-78%) scale(1.1); opacity: 0; }
        }

        /* ===== Screen shake ===== */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-7px); }
            80% { transform: translateX(7px); }
        }

        body.shaking { animation: shake 0.4s ease-out; }

        /* ===== Start screen ===== */
        #start-screen {
            position: fixed; inset: 0;
            background: rgba(235, 248, 255, 0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }

        #start-screen h1 {
            font-size: clamp(2rem, 9vw, 3.8rem);
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #FFB3B3;
            text-align: center;
        }

        #start-screen p {
            font-size: clamp(0.95rem, 3.8vw, 1.35rem);
            color: #555;
            text-align: center;
            line-height: 1.7;
        }

        .big-btn {
            font-size: clamp(1.2rem, 5vw, 1.9rem);
            font-family: inherit;
            padding: 18px 64px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #FF6B6B, #FF9A3C);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(255,107,107,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .big-btn:active {
            transform: scale(0.93);
            box-shadow: 0 3px 10px rgba(255,107,107,0.35);
        }

        /* ===== Game over screen ===== */
        #gameover-screen {
            position: fixed; inset: 0;
            background: rgba(15, 5, 35, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 26px;
            z-index: 900;
            animation: fadein 0.45s ease-out;
        }

        #gameover-screen.visible { display: flex; }

        @keyframes fadein {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        #gameover-screen h2 {
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #7B0000;
        }

        #gameover-info {
            font-size: clamp(1.3rem, 5.5vw, 2.2rem);
            color: #fff;
            text-align: center;
            line-height: 1.75;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        #gameover-info b { color: #FFD700; }
    </style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen">
    <h1>🎈 ふうせんわり 🎈</h1>
    <p>ふうせんを タップして わろう！<br>のがすと ❤️ がへるよ！</p>
    <button class="big-btn" onclick="startGame()">はじめる！</button>
</div>

<!-- ゲームオーバー画面 -->
<div id="gameover-screen">
    <h2>ゲームオーバー</h2>
    <div id="gameover-info"></div>
    <button class="big-btn" onclick="restartGame()">もう一度！</button>
</div>

<!-- HUD -->
<div id="hud">
    <div id="lives"></div>
    <div id="score">🎈 0</div>
    <div id="level-badge">Lv.1</div>
</div>

<div id="game-area"></div>

<script>
// ===== 定数 =====
const COLORS = [
    { body: '#FF6B6B', knot: '#D44F4F' },
    { body: '#FFB347', knot: '#D4832A' },
    { body: '#7ED87E', knot: '#4CAF50' },
    { body: '#6BB8FF', knot: '#3382D4' },
    { body: '#CC80FF', knot: '#9944CC' },
    { body: '#FF85A1', knot: '#D45577' },
    { body: '#FFEC6E', knot: '#CCA822' },
    { body: '#5CE0D8', knot: '#2BA09A' },
];

const POP_WORDS = ['パン！', 'ポン！', 'バン！', 'ぱちん！', 'ポポン！'];
const MILESTONES = {
    5:  'すごい！5こ！',
    10: 'やった！10こ！',
    20: '20こ！！すごい！！',
    50: '50こ！！！さいきょう！！！',
};

// レベル設定 [minDur秒, maxDur秒, スポーン間隔ms]
// スコアが上がるほど早くなる（Lv1→Lv5）
const LEVELS = [
    null,
    { min: 7,   max: 12,  spawn: 2200 }, // Lv1: 0〜9こ
    { min: 5.5, max: 9.5, spawn: 1700 }, // Lv2: 10〜19こ
    { min: 4.2, max: 7.5, spawn: 1300 }, // Lv3: 20〜34こ
    { min: 3.0, max: 6.0, spawn: 1000 }, // Lv4: 35〜49こ
    { min: 2.0, max: 4.5, spawn:  750 }, // Lv5: 50こ〜
];
const LEVEL_AT = [0, 0, 10, 20, 35, 50];

// ===== 状態 =====
let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;
let spawnTimer  = null;

// ===== DOM =====
const gameArea       = document.getElementById('game-area');
const scoreEl        = document.getElementById('score');
const livesEl        = document.getElementById('lives');
const levelBadge     = document.getElementById('level-badge');
const startScreen    = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const gameoverInfo   = document.getElementById('gameover-info');

// ===== Audio =====
const ctx = new (window.AudioContext || window.webkitAudioContext)();

const masterGain = ctx.createGain();
masterGain.gain.value = 0.85;
masterGain.connect(ctx.destination);

const bgmGain = ctx.createGain();
bgmGain.gain.value = 0.2;
bgmGain.connect(masterGain);

const sfxGain = ctx.createGain();
sfxGain.gain.value = 1.0;
sfxGain.connect(masterGain);

// --- BGM ---
// ペンタトニック音階による明るいメロディ (32拍ループ)
const BPM = 136;
const Q   = 60 / BPM; // 四分音符の秒数

// [周波数Hz, 拍数]  0=休符
const MELODY = [
    [523, 1], [659, 1], [784, 1], [659, 1],  // C5 E5 G5 E5
    [523, 1], [587, 1], [659, 2],              // C5 D5 E5--
    [392, 1], [440, 1], [523, 1], [440, 1],  // G4 A4 C5 A4
    [392, 1], [440, 1], [523, 2],              // G4 A4 C5--
    [587, 1], [659, 1], [784, 1], [659, 1],  // D5 E5 G5 E5
    [587, 1], [523, 1], [587, 2],              // D5 C5 D5--
    [784, 1], [659, 1], [523, 1], [440, 1],  // G5 E5 C5 A4
    [523, 4],                                   // C5----
];

let bgmPlaying = false;
let bgmTickTimer = null;

function scheduleMelody(startTime) {
    let t = startTime;
    MELODY.forEach(([freq, beats]) => {
        const dur = beats * Q;
        if (freq > 0) {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(bgmGain);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(0.5, t);
            gain.gain.setValueAtTime(0.5, t + dur * 0.72);
            gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.97);
            osc.start(t);
            osc.stop(t + dur);
        }
        t += dur;
    });
    return t - startTime; // ループ全体の長さ(秒)
}

function startBGM() {
    if (bgmPlaying) return;
    bgmPlaying = true;
    bgmGain.gain.cancelScheduledValues(ctx.currentTime);
    bgmGain.gain.setValueAtTime(0.2, ctx.currentTime);

    let nextTime = ctx.currentTime + 0.05;

    function tick() {
        if (!bgmPlaying) return;
        // 2秒先まで事前スケジューリングしてループを途切れさせない
        while (nextTime < ctx.currentTime + 2.0) {
            nextTime += scheduleMelody(nextTime);
        }
        bgmTickTimer = setTimeout(tick, 500);
    }
    tick();
}

function stopBGM() {
    bgmPlaying = false;
    clearTimeout(bgmTickTimer);
    // ゲイン即フェードアウト（スケジュール済み音符を無音化）
    bgmGain.gain.setTargetAtTime(0.001, ctx.currentTime, 0.15);
}

// --- SFX ---
function playPop() {
    const now   = ctx.currentTime;
    const pitch = 0.75 + Math.random() * 0.6;
    const osc   = ctx.createOscillator();
    const gain  = ctx.createGain();
    osc.connect(gain);
    gain.connect(sfxGain);
    osc.type = 'square';
    osc.frequency.setValueAtTime(750 * pitch, now);
    osc.frequency.exponentialRampToValueAtTime(140 * pitch, now + 0.13);
    gain.gain.setValueAtTime(0.16, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.start(now);
    osc.stop(now + 0.2);
}

function playLifeLoss() {
    const now = ctx.currentTime;
    [380, 280, 180].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(sfxGain);
        const t = now + i * 0.18;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        osc.start(t);
        osc.stop(t + 0.25);
    });
}

function playLevelUp() {
    const now = ctx.currentTime;
    [523, 659, 784, 1047].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(sfxGain);
        const t = now + i * 0.11;
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t);
        osc.stop(t + 0.22);
    });
}

function playGameOver() {
    const now = ctx.currentTime;
    [320, 260, 210, 160].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(sfxGain);
        const t = now + i * 0.28;
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.start(t);
        osc.stop(t + 0.38);
    });
}

// ===== レベル =====
function calcLevel(s) {
    for (let lv = LEVEL_AT.length - 1; lv >= 1; lv--) {
        if (s >= LEVEL_AT[lv]) return lv;
    }
    return 1;
}

// ===== ライフ表示 =====
function renderLives() {
    livesEl.innerHTML = '';
    for (let i = 0; i < 3; i++) {
        const span = document.createElement('span');
        span.className = 'heart' + (i >= lives ? ' lost' : '');
        span.textContent = '❤️';
        livesEl.appendChild(span);
    }
}

// ===== 風船生成 =====
function lighten(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+65)},${Math.min(255,g+65)},${Math.min(255,b+65)})`;
}

function spawnBalloon() {
    if (!gameRunning) return;

    const lv    = calcLevel(score);
    const cfg   = LEVELS[lv];
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const x     = 6 + Math.random() * 84;
    const size  = 65 + Math.random() * 50;
    const dur   = cfg.min + Math.random() * (cfg.max - cfg.min);

    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.style.left = x + '%';
    balloon.style.top  = '105vh';
    balloon.style.animationDuration = dur + 's';

    const body = document.createElement('div');
    body.className = 'b-body';
    body.style.cssText = `
        width:${size}px;
        height:${size * 1.2}px;
        background: radial-gradient(circle at 38% 32%, ${lighten(color.body)}, ${color.body});
    `;
    const shine = document.createElement('div');
    shine.className = 'b-shine';
    body.appendChild(shine);

    const tip = document.createElement('div');
    tip.className = 'b-tip';
    tip.style.borderTop = `13px solid ${color.body}`;

    const knot = document.createElement('div');
    knot.className = 'b-knot';
    knot.style.background = color.knot;

    const str = document.createElement('div');
    str.className = 'b-string';

    balloon.append(body, tip, knot, str);

    // タップで割る
    balloon.addEventListener('pointerdown', e => {
        e.preventDefault();
        if (!balloon.parentNode || !gameRunning) return;
        balloon.remove();
        score++;
        scoreEl.textContent = '🎈 ' + score;
        playPop();
        showBurst(e.clientX, e.clientY, color.body);
        showWord(e.clientX, e.clientY);
        if (MILESTONES[score]) showNotif(MILESTONES[score], 'milestone');

        // レベルアップチェック
        const newLv = calcLevel(score);
        if (newLv !== level) {
            level = newLv;
            levelBadge.textContent = 'Lv.' + level;
            showNotif('⬆️ レベル ' + level + '！', 'levelup');
            playLevelUp();
        }
    });

    // 画面上端に到達 → ライフ減少
    balloon.addEventListener('animationend', () => {
        if (balloon.parentNode) {
            balloon.remove();
            loseLife();
        }
    });

    gameArea.appendChild(balloon);
    spawnTimer = setTimeout(spawnBalloon, cfg.spawn);
}

// ===== ライフ減少 / ゲームオーバー =====
function loseLife() {
    if (!gameRunning) return;
    lives = Math.max(0, lives - 1);
    renderLives();
    playLifeLoss();

    // 画面シェイク
    document.body.classList.remove('shaking');
    void document.body.offsetWidth; // reflow でアニメーション再起動
    document.body.classList.add('shaking');
    setTimeout(() => document.body.classList.remove('shaking'), 420);

    if (lives === 0) setTimeout(triggerGameOver, 250);
}

function triggerGameOver() {
    gameRunning = false;
    clearTimeout(spawnTimer);
    stopBGM();
    playGameOver();
    gameArea.innerHTML = '';

    gameoverInfo.innerHTML =
        `スコア：<b>${score} こ</b><br>レベル：<b>${level}</b>`;
    gameoverScreen.classList.add('visible');
}

// ===== 通知 =====
function showBurst(x, y, color) {
    const wrap = document.createElement('div');
    wrap.className = 'burst';
    wrap.style.cssText = `left:${x}px; top:${y}px;`;
    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const dist  = 38 + Math.random() * 48;
        const s     = 8 + Math.random() * 9;
        const dot   = document.createElement('div');
        dot.className = 'burst-dot';
        dot.style.cssText = `
            width:${s}px; height:${s}px; background:${color};
            left:-${s/2}px; top:-${s/2}px;
            --dx:${Math.cos(angle)*dist}px; --dy:${Math.sin(angle)*dist}px;
        `;
        wrap.appendChild(dot);
    }
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), 580);
}

function showWord(x, y) {
    const el = document.createElement('div');
    el.className = 'pop-word';
    el.textContent = POP_WORDS[Math.floor(Math.random() * POP_WORDS.length)];
    el.style.cssText = `left:${x}px; top:${y}px;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
}

function showNotif(text, type) {
    const el = document.createElement('div');
    el.className = `notif notif-${type}`;
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
}

// ===== ゲーム制御 =====
function startGame() {
    startScreen.style.display = 'none';
    score = 0; lives = 3; level = 1;
    gameRunning = true;
    scoreEl.textContent = '🎈 0';
    levelBadge.textContent = 'Lv.1';
    renderLives();
    ctx.resume();
    startBGM();
    spawnBalloon();
}

function restartGame() {
    gameoverScreen.classList.remove('visible');
    clearTimeout(spawnTimer);
    gameArea.innerHTML = '';
    score = 0; lives = 3; level = 1;
    gameRunning = true;
    scoreEl.textContent = '🎈 0';
    levelBadge.textContent = 'Lv.1';
    renderLives();
    startBGM();
    spawnBalloon();
}
</script>
</body>
</html>
