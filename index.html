<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ふうせんわり</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            background: linear-gradient(160deg, #87CEEB 0%, #E0F4FF 60%, #C5E8F7 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Hiragino Rounded Gothic ProN', 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
        }

        #score {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.4rem, 5vw, 2.4rem);
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 8px 28px;
            border-radius: 999px;
            z-index: 50;
            white-space: nowrap;
        }

        #game-area {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            animation: float-up linear forwards;
        }

        .b-body {
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            position: relative;
            box-shadow: inset -8px -12px 20px rgba(0,0,0,0.1);
            transition: transform 0.08s ease;
        }

        .balloon:active .b-body { transform: scale(1.18); }

        .b-shine {
            position: absolute;
            top: 18%;
            left: 22%;
            width: 28%;
            height: 32%;
            background: rgba(255,255,255,0.42);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .b-tip {
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            margin-top: -1px;
        }

        .b-knot {
            width: 11px;
            height: 9px;
            border-radius: 50%;
        }

        .b-string {
            width: 1.5px;
            height: 52px;
            background: rgba(0,0,0,0.22);
            margin-top: 2px;
        }

        @keyframes float-up {
            0%   { transform: translateY(0) rotate(-4deg); }
            20%  { transform: translateY(-22vh) rotate(4deg); }
            40%  { transform: translateY(-44vh) rotate(-3deg); }
            60%  { transform: translateY(-66vh) rotate(4deg); }
            80%  { transform: translateY(-88vh) rotate(-3deg); }
            100% { transform: translateY(-128vh) rotate(3deg); }
        }

        /* バースト */
        .burst { position: fixed; pointer-events: none; z-index: 200; }

        .burst-dot {
            position: absolute;
            border-radius: 50%;
            animation: burst-move 0.5s ease-out forwards;
        }

        @keyframes burst-move {
            from { transform: translate(0,0) scale(1); opacity: 1; }
            to   { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
        }

        /* ポップ文字 */
        .pop-word {
            position: fixed;
            font-size: clamp(1.4rem, 6vw, 2.4rem);
            font-weight: bold;
            color: #FF4455;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.12);
            pointer-events: none;
            z-index: 300;
            animation: pop-word 0.8s ease-out forwards;
            transform: translate(-50%, -50%);
        }

        @keyframes pop-word {
            0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
            55%  { transform: translate(-50%,-110%) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%,-150%) scale(1.1); opacity: 0; }
        }

        /* マイルストーン */
        .milestone {
            position: fixed;
            top: 45%;
            left: 50%;
            font-size: clamp(1.8rem, 9vw, 3.5rem);
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 0 #FF8C00;
            pointer-events: none;
            z-index: 400;
            animation: milestone-anim 1.3s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes milestone-anim {
            0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
            50%  { transform: translate(-50%,-60%) scale(1.35); opacity: 1; }
            100% { transform: translate(-50%,-75%) scale(1.1); opacity: 0; }
        }

        /* スタート画面 */
        #start-screen {
            position: fixed;
            inset: 0;
            background: rgba(235, 248, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            z-index: 1000;
        }

        #start-screen h1 {
            font-size: clamp(2rem, 9vw, 3.8rem);
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #FFB3B3;
            text-align: center;
        }

        #start-screen p {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: #555;
        }

        #start-btn {
            font-size: clamp(1.2rem, 5vw, 1.9rem);
            font-family: inherit;
            padding: 18px 64px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #FF6B6B, #FF9A3C);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(255,107,107,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        #start-btn:active {
            transform: scale(0.93);
            box-shadow: 0 3px 10px rgba(255,107,107,0.35);
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>🎈 ふうせんわり 🎈</h1>
    <p>ふうせんを タップして わろう！</p>
    <button id="start-btn" onclick="startGame()">はじめる！</button>
</div>

<div id="score">🎈 0</div>
<div id="game-area"></div>

<script>
const COLORS = [
    { body: '#FF6B6B', knot: '#D44F4F' },
    { body: '#FFB347', knot: '#D4832A' },
    { body: '#7ED87E', knot: '#4CAF50' },
    { body: '#6BB8FF', knot: '#3382D4' },
    { body: '#CC80FF', knot: '#9944CC' },
    { body: '#FF85A1', knot: '#D45577' },
    { body: '#FFEC6E', knot: '#CCA822' },
    { body: '#5CE0D8', knot: '#2BA09A' },
];

const POP_WORDS = ['パン！', 'ポン！', 'バン！', 'ぱちん！', 'ポポン！'];
const MILESTONES = { 5: 'すごい！5こ！', 10: 'やった！10こ！', 20: '20こ！！すごい！！', 50: '50こ！！！さいきょう！！！' };

let score = 0;
let gameRunning = false;
let spawnTimer = null;

const gameArea = document.getElementById('game-area');
const scoreEl  = document.getElementById('score');
const startScreen = document.getElementById('start-screen');

const audio = new (window.AudioContext || window.webkitAudioContext)();

function playPop() {
    const now = audio.currentTime;
    const osc  = audio.createOscillator();
    const gain = audio.createGain();
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.type = 'square';
    const pitch = 0.75 + Math.random() * 0.6;
    osc.frequency.setValueAtTime(750 * pitch, now);
    osc.frequency.exponentialRampToValueAtTime(140 * pitch, now + 0.13);
    gain.gain.setValueAtTime(0.16, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.start(now);
    osc.stop(now + 0.2);
}

function lighten(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgb(${Math.min(255,r+65)},${Math.min(255,g+65)},${Math.min(255,b+65)})`;
}

function spawnBalloon() {
    if (!gameRunning) return;

    const color    = COLORS[Math.floor(Math.random() * COLORS.length)];
    const x        = 6 + Math.random() * 84;        // % from left
    const size     = 65 + Math.random() * 50;        // px
    const duration = 5 + Math.random() * 5;          // seconds to cross screen

    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.style.left = x + '%';
    balloon.style.top  = '105vh';
    balloon.style.animationDuration = duration + 's';

    const body = document.createElement('div');
    body.className = 'b-body';
    body.style.cssText = `
        width:${size}px;
        height:${size * 1.2}px;
        background: radial-gradient(circle at 38% 32%, ${lighten(color.body)}, ${color.body});
    `;
    const shine = document.createElement('div');
    shine.className = 'b-shine';
    body.appendChild(shine);

    const tip = document.createElement('div');
    tip.className = 'b-tip';
    tip.style.borderTop = `13px solid ${color.body}`;

    const knot = document.createElement('div');
    knot.className = 'b-knot';
    knot.style.background = color.knot;

    const string = document.createElement('div');
    string.className = 'b-string';

    balloon.append(body, tip, knot, string);

    balloon.addEventListener('pointerdown', e => {
        e.preventDefault();
        if (!balloon.parentNode) return;
        balloon.remove();
        score++;
        scoreEl.textContent = '🎈 ' + score;
        playPop();
        showBurst(e.clientX, e.clientY, color.body);
        showWord(e.clientX, e.clientY);
        if (MILESTONES[score]) showMilestone(MILESTONES[score]);
    });

    balloon.addEventListener('animationend', () => balloon.remove());
    gameArea.appendChild(balloon);

    // 徐々にスポーン間隔を短く (最短600ms)
    const delay = Math.max(600, 1300 - score * 12);
    spawnTimer = setTimeout(spawnBalloon, delay);
}

function showBurst(x, y, color) {
    const wrap = document.createElement('div');
    wrap.className = 'burst';
    wrap.style.cssText = `left:${x}px; top:${y}px;`;
    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const dist  = 38 + Math.random() * 48;
        const s     = 8 + Math.random() * 9;
        const dot   = document.createElement('div');
        dot.className = 'burst-dot';
        dot.style.cssText = `
            width:${s}px; height:${s}px;
            background:${color};
            left:-${s/2}px; top:-${s/2}px;
            --dx:${Math.cos(angle)*dist}px;
            --dy:${Math.sin(angle)*dist}px;
        `;
        wrap.appendChild(dot);
    }
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), 580);
}

function showWord(x, y) {
    const el = document.createElement('div');
    el.className = 'pop-word';
    el.textContent = POP_WORDS[Math.floor(Math.random() * POP_WORDS.length)];
    el.style.cssText = `left:${x}px; top:${y}px;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
}

function showMilestone(text) {
    const el = document.createElement('div');
    el.className = 'milestone';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
}

function startGame() {
    startScreen.style.display = 'none';
    gameRunning = true;
    score = 0;
    scoreEl.textContent = '🎈 0';
    audio.resume();
    spawnBalloon();
}
</script>
</body>
</html>
