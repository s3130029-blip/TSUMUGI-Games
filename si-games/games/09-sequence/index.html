<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いちばんちいさいのは？</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .size-opts {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: flex-end;
      width: 100%;
      max-width: 360px;
    }
    .size-opt {
      flex: 1;
      background: #fff;
      border: 4px solid #ffe082;
      border-radius: 18px;
      padding: 12px 6px;
      cursor: pointer;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 8px rgba(0,0,0,.07);
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .size-opt:active { transform: scale(.92); }
    .size-opt.ok  { border-color: #66bb6a; background: #e8f5e9; pointer-events: none; }
    .size-opt.ng  { border-color: #ef5350; background: #ffebee; }
    .size-opt.off { pointer-events: none; opacity: .55; }
  </style>
</head>
<body>
  <div class="g-header">
    <a href="../../index.html" class="back-a">🏠</a>
    <span class="g-title">📐 おおきさならべ</span>
    <span class="g-prog" id="prog">1 / 5</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="fill" style="width:0%"></div></div>

  <div id="ga">
    <div class="g-body">
      <div class="q-label" id="label">いちばん ちいさいのはどれ？</div>
      <div class="size-opts" id="opts"></div>
    </div>
  </div>
  <div class="result" id="result"></div>

  <script src="../../common.js"></script>
  <script>
    // sizes: 3 font sizes. smallestIdx = index of the smallest.
    const Q = [
      { emoji:'⭐', sizes:['1.6rem','3.8rem','5.6rem'], smallestIdx:0 },
      { emoji:'🍎', sizes:['5rem','1.6rem','3.2rem'],   smallestIdx:1 },
      { emoji:'🐱', sizes:['3rem','5rem','1.5rem'],      smallestIdx:2 },
      { emoji:'🚗', sizes:['1.6rem','4rem','2.6rem'],    smallestIdx:0 },
      { emoji:'🌸', sizes:['4rem','2rem','5.5rem'],      smallestIdx:1 },
    ];
    let cur = 0, score = 0;

    function render() {
      const q = Q[cur];
      document.getElementById('prog').textContent = (cur+1) + ' / ' + Q.length;
      document.getElementById('fill').style.width  = (cur / Q.length * 100) + '%';
      const opts = document.getElementById('opts');
      opts.innerHTML = '';
      q.sizes.forEach((sz, i) => {
        const b = document.createElement('button');
        b.className = 'size-opt';
        b.innerHTML = `<span style="font-size:${sz}">${q.emoji}</span>`;
        b.onclick = () => pick(b, i === q.smallestIdx);
        opts.appendChild(b);
      });
    }

    function pick(btn, ok) {
      document.querySelectorAll('.size-opt').forEach(b => b.classList.add('off'));
      btn.classList.remove('off');
      btn.classList.add(ok ? 'ok' : 'ng', ok ? 'anim-b' : 'anim-s');
      if (ok) { score++; SIAsobi.burst(btn); SIAsobi.correct(); } else SIAsobi.wrong();
      setTimeout(() => { cur++; cur < Q.length ? render() : showResult(); }, 900);
    }

    function showResult() {
      document.getElementById('ga').style.display = 'none';
      const r = document.getElementById('result');
      r.classList.add('on');
      const n = Q.length;
      const s = score >= n ? '⭐⭐⭐' : score >= Math.ceil(n*.6) ? '⭐⭐' : '⭐';
      const e = score >= n ? '🎉' : score >= Math.ceil(n*.6) ? '😄' : '😊';
      const t = score >= n ? 'かんぺき！' : score >= Math.ceil(n*.6) ? 'よくできました！' : 'もういちどやってみよう！';
      r.innerHTML = `<div class="r-emoji">${e}</div><div class="r-title">${t}</div><div class="r-stars">${s}</div><div class="r-score">${score} / ${n} もんせいかい</div><button class="btn-p" onclick="restart()">もういちど ▶</button><a href="../../index.html" class="btn-s">🏠 ホームへ</a>`;
    }

    function restart() {
      cur = 0; score = 0;
      document.getElementById('ga').style.display = '';
      const r = document.getElementById('result');
      r.classList.remove('on'); r.innerHTML = '';
      render();
    }

    render();
  </script>
</body>
</html>
