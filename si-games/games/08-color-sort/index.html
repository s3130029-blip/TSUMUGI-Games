<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いろわけ</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .current-item {
      font-size: 5rem;
      background: #fff;
      border: 4px solid #ffe082;
      border-radius: 20px;
      padding: 20px 36px;
      box-shadow: 0 3px 10px rgba(0,0,0,.07);
    }
    .bucket-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      width: 100%;
      max-width: 380px;
    }
    .bucket {
      flex: 1;
      background: #fff;
      border: 4px solid #ffe082;
      border-radius: 18px;
      padding: 14px 6px;
      font-size: 2rem;
      cursor: pointer;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 3px 8px rgba(0,0,0,.07);
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .bucket span { font-size: .7rem; color: #888; }
    .bucket:active { transform: scale(.92); }
    .bucket.ok  { border-color: #66bb6a; background: #e8f5e9; pointer-events: none; }
    .bucket.ng  { border-color: #ef5350; background: #ffebee; }
    .bucket.off { pointer-events: none; opacity: .5; }
    .remaining  { font-size: .9rem; color: #bbb; }
  </style>
</head>
<body>
  <div class="g-header">
    <a href="../../index.html" class="back-a">🏠</a>
    <span class="g-title">🎨 いろわけ</span>
    <span class="g-prog" id="prog">1 / 6</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="fill" style="width:0%"></div></div>

  <div id="ga">
    <div class="g-body">
      <div class="q-label">おなじいろのバケツにいれよう！</div>
      <div class="current-item" id="item"></div>
      <div class="bucket-row" id="buckets"></div>
    </div>
  </div>
  <div class="result" id="result"></div>

  <script>
    const BUCKETS = [
      { emoji:'🪣', color:'🔴', label:'あか' },
      { emoji:'🪣', color:'🔵', label:'あお' },
      { emoji:'🟡', color:'🟡', label:'きいろ' },
    ];
    const ITEMS = ['🔴','🔵','🟡','🔴','🔵','🟡'];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    let items, cur, score;

    function beep(ok) {
      try {
        const A = new (window.AudioContext || window.webkitAudioContext)();
        const o = A.createOscillator(), g = A.createGain();
        o.connect(g); g.connect(A.destination);
        if (ok) {
          [523,659,784].forEach((f,i) => o.frequency.setValueAtTime(f, A.currentTime + i*.12));
          g.gain.setValueAtTime(.22, A.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, A.currentTime + .6);
          o.start(); o.stop(A.currentTime + .6);
        } else {
          o.frequency.setValueAtTime(260, A.currentTime);
          o.frequency.setValueAtTime(190, A.currentTime + .18);
          g.gain.setValueAtTime(.22, A.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, A.currentTime + .36);
          o.start(); o.stop(A.currentTime + .36);
        }
      } catch(e) {}
    }

    function init() {
      items = shuffle(ITEMS);
      cur = 0; score = 0;
    }

    function render() {
      document.getElementById('prog').textContent = (cur+1) + ' / ' + items.length;
      document.getElementById('fill').style.width  = (cur / items.length * 100) + '%';
      document.getElementById('item').textContent = items[cur];

      const row = document.getElementById('buckets');
      row.innerHTML = '';
      BUCKETS.forEach(bk => {
        const b = document.createElement('button');
        b.className = 'bucket';
        b.innerHTML = bk.color + '<span>' + bk.label + '</span>';
        b.onclick = () => pick(b, bk.color === items[cur]);
        row.appendChild(b);
      });
    }

    function pick(btn, ok) {
      document.querySelectorAll('.bucket').forEach(b => b.classList.add('off'));
      btn.classList.remove('off');
      btn.classList.add(ok ? 'ok' : 'ng', ok ? 'anim-b' : 'anim-s');
      if (ok) score++;
      beep(ok);
      setTimeout(() => { cur++; cur < items.length ? render() : showResult(); }, 900);
    }

    function showResult() {
      document.getElementById('ga').style.display = 'none';
      const r = document.getElementById('result');
      r.classList.add('on');
      const n = items.length;
      const s = score >= n ? '⭐⭐⭐' : score >= Math.ceil(n*.6) ? '⭐⭐' : '⭐';
      const e = score >= n ? '🎉' : score >= Math.ceil(n*.6) ? '😄' : '😊';
      const t = score >= n ? 'かんぺき！' : score >= Math.ceil(n*.6) ? 'よくできました！' : 'もういちどやってみよう！';
      r.innerHTML = `<div class="r-emoji">${e}</div><div class="r-title">${t}</div><div class="r-stars">${s}</div><div class="r-score">${score} / ${n} もんせいかい</div><button class="btn-p" onclick="restart()">もういちど ▶</button><a href="../../index.html" class="btn-s">🏠 ホームへ</a>`;
    }

    function restart() {
      document.getElementById('ga').style.display = '';
      const r = document.getElementById('result');
      r.classList.remove('on'); r.innerHTML = '';
      init(); render();
    }

    init(); render();
  </script>
</body>
</html>
