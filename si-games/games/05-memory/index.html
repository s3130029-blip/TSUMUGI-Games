<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しんけいすいじゃく</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="g-header">
    <a href="../../index.html" class="back-a">🏠</a>
    <span class="g-title">🃏 しんけいすいじゃく</span>
    <span class="g-prog" id="prog">ペア: 0 / 4</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="fill" style="width:0%"></div></div>

  <div id="ga">
    <div class="g-body">
      <div class="q-label">おなじカードをさがそう！</div>
      <div class="card-grid" id="grid"></div>
    </div>
  </div>
  <div class="result" id="result"></div>

  <script src="../../common.js"></script>
  <script>
    const EMOJIS = ['🐱','🐶','🍎','⭐','🌸','🚗','🦋','🍕'];
    const TOTAL_PAIRS = 4;
    let flipped = [], matched = 0, locked = false, moves = 0;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      flipped = []; matched = 0; locked = false; moves = 0;
      const pairs = shuffle([...EMOJIS.slice(0, TOTAL_PAIRS), ...EMOJIS.slice(0, TOTAL_PAIRS)]);
      document.getElementById('prog').textContent = 'ペア: 0 / ' + TOTAL_PAIRS;
      document.getElementById('fill').style.width = '0%';
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
      pairs.forEach((e, i) => {
        const d = document.createElement('div');
        d.className = 'card';
        d.dataset.emoji = e;
        d.innerHTML = `<div class="card-inner"><div class="card-front">🎴</div><div class="card-back">${e}</div></div>`;
        d.onclick = () => flip(d);
        grid.appendChild(d);
      });
    }

    function flip(el) {
      if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      el.classList.add('flipped');
      flipped.push(el);
      if (flipped.length === 2) {
        locked = true; moves++;
        const [a, b] = flipped;
        if (a.dataset.emoji === b.dataset.emoji) {
          a.classList.add('matched'); b.classList.add('matched');
          SIAsobi.correct(); SIAsobi.burst(b); matched++;
          document.getElementById('prog').textContent = 'ペア: ' + matched + ' / ' + TOTAL_PAIRS;
          document.getElementById('fill').style.width = (matched / TOTAL_PAIRS * 100) + '%';
          flipped = []; locked = false;
          if (matched === TOTAL_PAIRS) setTimeout(showResult, 600);
        } else {
          SIAsobi.wrong();
          setTimeout(() => {
            a.classList.remove('flipped'); b.classList.remove('flipped');
            flipped = []; locked = false;
          }, 1000);
        }
      }
    }

    function showResult() {
      document.getElementById('ga').style.display = 'none';
      const r = document.getElementById('result');
      r.classList.add('on');
      const s = moves <= TOTAL_PAIRS + 2 ? '⭐⭐⭐' : moves <= TOTAL_PAIRS * 2 + 2 ? '⭐⭐' : '⭐';
      r.innerHTML = `<div class="r-emoji">🎉</div><div class="r-title">ぜんぶそろった！</div><div class="r-stars">${s}</div><div class="r-score">${moves} かいでクリア</div><button class="btn-p" onclick="restart()">もういちど ▶</button><a href="../../index.html" class="btn-s">🏠 ホームへ</a>`;
    }

    function restart() {
      document.getElementById('ga').style.display = '';
      const r = document.getElementById('result');
      r.classList.remove('on'); r.innerHTML = '';
      init();
    }

    init();
  </script>
</body>
</html>
