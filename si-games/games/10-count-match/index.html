<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かずあわせ</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .emoji-field {
      background: #fff;
      border: 4px solid #ffe082;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,.07);
      font-size: 3rem;
      line-height: 1.3;
      text-align: center;
      letter-spacing: 4px;
      min-width: 220px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .num-btn {
      background: #fff;
      border: 4px solid #ffe082;
      border-radius: 18px;
      padding: 12px;
      font-size: 1.8rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 8px rgba(0,0,0,.07);
      transition: transform .1s;
      color: #4a3728;
      -webkit-tap-highlight-color: transparent;
    }
    .num-btn:active { transform: scale(.92); }
    .num-btn.ok  { border-color: #66bb6a; background: #e8f5e9; pointer-events: none; }
    .num-btn.ng  { border-color: #ef5350; background: #ffebee; }
    .num-btn.off { pointer-events: none; opacity: .55; }
  </style>
</head>
<body>
  <div class="g-header">
    <a href="../../index.html" class="back-a">🏠</a>
    <span class="g-title">🔢 かずあわせ</span>
    <span class="g-prog" id="prog">1 / 5</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="fill" style="width:0%"></div></div>

  <div id="ga">
    <div class="g-body">
      <div class="q-label">いくつあるかな？</div>
      <div class="emoji-field" id="field"></div>
      <div class="opts-5n" id="opts"></div>
    </div>
  </div>
  <div class="result" id="result"></div>

  <script src="../../common.js"></script>
  <script>
    const Q = [
      { emoji:'🍎', count:3 },
      { emoji:'🐱', count:2 },
      { emoji:'⭐', count:4 },
      { emoji:'🚗', count:1 },
      { emoji:'🌸', count:5 },
    ];
    let cur = 0, score = 0;

    function render() {
      const q = Q[cur];
      document.getElementById('prog').textContent = (cur+1) + ' / ' + Q.length;
      document.getElementById('fill').style.width  = (cur / Q.length * 100) + '%';
      document.getElementById('field').textContent = q.emoji.repeat(q.count);

      const opts = document.getElementById('opts');
      opts.innerHTML = '';
      [1,2,3,4,5].forEach(n => {
        const b = document.createElement('button');
        b.className = 'num-btn'; b.textContent = n;
        b.onclick = () => pick(b, n === q.count);
        opts.appendChild(b);
      });
    }

    function pick(btn, ok) {
      document.querySelectorAll('.num-btn').forEach(b => b.classList.add('off'));
      btn.classList.remove('off');
      btn.classList.add(ok ? 'ok' : 'ng', ok ? 'anim-b' : 'anim-s');
      if (ok) { score++; SIAsobi.burst(btn); SIAsobi.correct(); } else SIAsobi.wrong();
      setTimeout(() => { cur++; cur < Q.length ? render() : showResult(); }, 900);
    }

    function showResult() {
      document.getElementById('ga').style.display = 'none';
      const r = document.getElementById('result');
      r.classList.add('on');
      const n = Q.length;
      const s = score >= n ? '⭐⭐⭐' : score >= Math.ceil(n*.6) ? '⭐⭐' : '⭐';
      const e = score >= n ? '🎉' : score >= Math.ceil(n*.6) ? '😄' : '😊';
      const t = score >= n ? 'かんぺき！' : score >= Math.ceil(n*.6) ? 'よくできました！' : 'もういちどやってみよう！';
      r.innerHTML = `<div class="r-emoji">${e}</div><div class="r-title">${t}</div><div class="r-stars">${s}</div><div class="r-score">${score} / ${n} もんせいかい</div><button class="btn-p" onclick="restart()">もういちど ▶</button><a href="../../index.html" class="btn-s">🏠 ホームへ</a>`;
    }

    function restart() {
      cur = 0; score = 0;
      document.getElementById('ga').style.display = '';
      const r = document.getElementById('result');
      r.classList.remove('on'); r.innerHTML = '';
      render();
    }

    render();
  </script>
</body>
</html>
